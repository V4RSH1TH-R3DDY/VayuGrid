<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VayuGrid — Demo Title Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b1120;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .card {
    text-align: center;
    padding: 3rem 4rem;
    border-radius: 2rem;
    background: radial-gradient(ellipse at 50% 0%, #1a2744 0%, #0b1120 70%);
    border: 1px solid rgba(56, 189, 248, 0.15);
    box-shadow: 0 0 80px rgba(56, 189, 248, 0.06);
    max-width: 780px;
  }

  .icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 1.5rem;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: #fff;
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.25);
  }

  h1 {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(to right, #e2e8f0, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 1.15rem;
    color: #64748b;
    margin-top: 0.75rem;
    line-height: 1.6;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  .divider {
    width: 60px;
    height: 2px;
    margin: 1.5rem auto;
    background: linear-gradient(to right, #38bdf8, #818cf8);
    border-radius: 1px;
  }

  .badges {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .badge {
    padding: 0.35rem 1rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 500;
    background: rgba(56, 189, 248, 0.08);
    color: #7dd3fc;
    border: 1px solid rgba(56, 189, 248, 0.12);
  }

  .subtitle {
    color: #475569;
    font-size: 0.85rem;
    margin-top: 2rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>

    <h1>VayuGrid</h1>
    <p class="tagline">
      Intelligent energy grid platform combining simulation, AI control,<br />
      peer-to-peer trading, and real-time monitoring.
    </p>

    <div class="divider"></div>

    <div class="badges">
      <span class="badge">Grid Simulation</span>
      <span class="badge">AI Agent (PPO)</span>
      <span class="badge">P2P Trading</span>
      <span class="badge">Live Dashboards</span>
      <span class="badge">Anomaly Detection</span>
    </div>

    <div class="subtitle">Platform Demo</div>
  </div>
</body>
</html>
