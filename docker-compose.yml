services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: vayugrid-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vayugrid}
      POSTGRES_USER: ${POSTGRES_USER:-vayugrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vayugrid}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-vayugrid} -d ${POSTGRES_DB:-vayugrid}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vayugrid-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: vayugrid-rabbitmq
    command:
      [
        "/bin/sh",
        "-c",
        "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server",
      ]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-vayugrid}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-vayugrid}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
      - "${RABBITMQ_PROMETHEUS_PORT:-15692}:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: infra/mlflow/Dockerfile
    container_name: vayugrid-mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-vayugrid}:${POSTGRES_PASSWORD:-vayugrid}@postgres:5432/${POSTGRES_DB:-vayugrid}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlruns
    command:
      [
        "mlflow",
        "server",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--backend-store-uri",
        "postgresql://${POSTGRES_USER:-vayugrid}:${POSTGRES_PASSWORD:-vayugrid}@postgres:5432/${POSTGRES_DB:-vayugrid}",
        "--artifacts-destination",
        "/mlruns",
      ]
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: vayugrid-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: vayugrid-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    container_name: vayugrid-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vayugrid}:${POSTGRES_PASSWORD:-vayugrid}@postgres:5432/${POSTGRES_DB:-vayugrid}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vayugrid-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws/stream
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
