name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy

      - name: Test
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build MLflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/mlflow/Dockerfile
          push: false
          tags: vayugrid/mlflow:ci

  model-benchmarks:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run simulator regression suite
        run: pytest tests/test_simulator.py -q
