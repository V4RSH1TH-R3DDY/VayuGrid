<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VayuGrid — Homeowner Dashboard Title Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b1120;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .card {
    text-align: center;
    padding: 3rem 4rem;
    border-radius: 2rem;
    background: radial-gradient(ellipse at 50% 0%, #1a3a2a 0%, #0b1120 70%);
    border: 1px solid rgba(52, 211, 153, 0.15);
    box-shadow: 0 0 80px rgba(52, 211, 153, 0.06);
    max-width: 780px;
  }
  .icon {
    width: 72px; height: 72px;
    margin: 0 auto 1.5rem;
    background: linear-gradient(135deg, #34d399, #10b981);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(52, 211, 153, 0.25);
  }
  h1 {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(to right, #e2e8f0, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-size: 1.15rem;
    color: #64748b;
    margin-top: 0.75rem;
    line-height: 1.6;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }
  .divider {
    width: 60px; height: 2px;
    margin: 1.5rem auto;
    background: linear-gradient(to right, #34d399, #10b981);
    border-radius: 1px;
  }
  .badges {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .badge {
    padding: 0.35rem 1rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 500;
    background: rgba(52, 211, 153, 0.08);
    color: #6ee7b7;
    border: 1px solid rgba(52, 211, 153, 0.12);
  }
  .subtitle {
    color: #475569;
    font-size: 0.85rem;
    margin-top: 2rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .user-row {
    margin-top: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34d399, #059669);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.1rem;
    color: #fff;
  }
  .user-info { text-align: left; }
  .user-name { color: #e2e8f0; font-weight: 600; font-size: 1rem; }
  .user-role { color: #64748b; font-size: 0.8rem; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#fff">
        <path d="M3 12h1m8-9v1m-6.5 6.5l.7.7M21 12h-1M6.5 5.5l-.7-.7M16 5l3 3-2 1 1 3-3 2"/>
        <path d="M12 22a7 7 0 100-14 7 7 0 000 14z"/>
        <path d="M9 12h2.5l1.5 2.5"/>
      </svg>
    </div>

    <h1>VayuGrid</h1>
    <p class="tagline">
      Homeowner Dashboard — personal energy consumption,<br />
      solar generation, battery storage, and P2P trading.
    </p>

    <div class="divider"></div>

    <div class="badges">
      <span class="badge">Energy Overview</span>
      <span class="badge">Battery Health</span>
      <span class="badge">EV Status</span>
      <span class="badge">P2P Earnings</span>
      <span class="badge">Data Consent</span>
    </div>

    <div class="user-row">
      <div class="avatar">R</div>
      <div class="user-info">
        <div class="user-name">reggie</div>
        <div class="user-role">Homeowner &middot; Node 1</div>
      </div>
    </div>

    <div class="subtitle">Demo User</div>
  </div>
</body>
</html>
