# VayuGrid — nginx reverse proxy with mutual TLS (mTLS)
#
# Vayu-Node devices must present a client certificate signed by the VayuGrid CA
# to reach the /api/nodes/* endpoints. Dashboard endpoints remain accessible
# over standard TLS (client cert optional) for browser compatibility.

events {
    worker_connections 1024;
}

http {
    upstream vayugrid_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTPS server (mTLS enforced for node endpoints) ──────────────────────
    server {
        listen      8443 ssl;
        server_name _;

        ssl_certificate       /etc/nginx/certs/server/server.crt;
        ssl_certificate_key   /etc/nginx/certs/server/server.key;
        ssl_client_certificate /etc/nginx/certs/ca/ca.crt;

        # Request but don't require client cert globally — enforced per-location below
        ssl_verify_client     optional;

        ssl_protocols         TLSv1.3;
        ssl_ciphers           ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache     shared:SSL:10m;
        ssl_session_timeout   1d;

        # Forward client certificate info to the backend
        proxy_set_header X-Client-Cert-DN       $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Verified $ssl_client_verify;
        proxy_set_header X-Forwarded-Proto      https;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header Host                   $host;

        # ── Node endpoints: require valid client certificate ──────────────
        location /api/nodes/ {
            if ($ssl_client_verify != SUCCESS) {
                return 403 "Client certificate required for node endpoints";
            }
            proxy_pass http://vayugrid_api;
        }

        # ── All other API + dashboard traffic ────────────────────────────
        location / {
            proxy_pass         http://vayugrid_api;
            proxy_http_version 1.1;
        }

        # ── WebSocket upgrade ────────────────────────────────────────────
        location /ws/ {
            proxy_pass          http://vayugrid_api;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
        }
    }
}
