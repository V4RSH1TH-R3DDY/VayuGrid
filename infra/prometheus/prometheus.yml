global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Placeholder targets for future app instrumentation.
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: postgres
    static_configs:
      - targets: []

  - job_name: redis
    static_configs:
      - targets: []
