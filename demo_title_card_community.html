<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VayuGrid — Community Dashboard Title Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b1120;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .card {
    text-align: center;
    padding: 3rem 4rem;
    border-radius: 2rem;
    background: radial-gradient(ellipse at 50% 0%, #2a1a3a 0%, #0b1120 70%);
    border: 1px solid rgba(192, 132, 252, 0.15);
    box-shadow: 0 0 80px rgba(192, 132, 252, 0.06);
    max-width: 780px;
  }
  .icon {
    width: 72px; height: 72px;
    margin: 0 auto 1.5rem;
    background: linear-gradient(135deg, #c084fc, #a855f7);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(192, 132, 252, 0.25);
  }
  h1 {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(to right, #e2e8f0, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-size: 1.15rem;
    color: #64748b;
    margin-top: 0.75rem;
    line-height: 1.6;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }
  .divider {
    width: 60px; height: 2px;
    margin: 1.5rem auto;
    background: linear-gradient(to right, #c084fc, #a855f7);
    border-radius: 1px;
  }
  .badges {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .badge {
    padding: 0.35rem 1rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 500;
    background: rgba(192, 132, 252, 0.08);
    color: #d8b4fe;
    border: 1px solid rgba(192, 132, 252, 0.12);
  }
  .subtitle {
    color: #475569;
    font-size: 0.85rem;
    margin-top: 2rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .user-row {
    margin-top: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #9333ea);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.1rem;
    color: #fff;
  }
  .user-info { text-align: left; }
  .user-name { color: #e2e8f0; font-weight: 600; font-size: 1rem; }
  .user-role { color: #64748b; font-size: 0.8rem; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#fff">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87"/>
        <path d="M16 3.13a4 4 0 010 7.75"/>
        <path d="M12 12l3 3-2 1 1 3"/>
      </svg>
    </div>

    <h1>VayuGrid</h1>
    <p class="tagline">
      Community Dashboard — collective savings, fairness<br />
      tracking, battery backup, and critical load management.
    </p>

    <div class="divider"></div>

    <div class="badges">
      <span class="badge">Community Savings</span>
      <span class="badge">Fairness Score</span>
      <span class="badge">Backup Hours</span>
      <span class="badge">Critical Loads</span>
      <span class="badge">Peak Sharing</span>
    </div>

    <div class="user-row">
      <div class="avatar">L</div>
      <div class="user-info">
        <div class="user-name">luigi</div>
        <div class="user-role">Community Manager</div>
      </div>
    </div>

    <div class="subtitle">Demo User</div>
  </div>
</body>
</html>
